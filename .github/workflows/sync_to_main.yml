name: Sync remote-main to main

on:
  workflow_run:
    workflows: ["Update version list"]
    types:
      - completed
    branches:
      - remote-main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Check workflow run status
        if: github.event.workflow_run.conclusion != 'success' && github.event_name == 'workflow_run'
        run: |
          echo "⚠️  Previous workflow did not complete successfully"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Skipping sync to main"
          exit 1
      
      - name: Sync remote-main to main
        run: |
          # Fetch the latest changes
          git fetch origin remote-main main
          
          # Checkout main branch
          git checkout main
          
          # Merge remote-main into main (allows divergence)
          # Main can have fork-specific changes while receiving updates from remote-main
          if git merge origin/remote-main --no-edit -m "chore: sync updates from remote-main [automated]"; then
            # Push the updated main branch
            git push origin main
            
            echo "✅ Successfully merged remote-main into main"
          else
            echo "❌ Merge conflict detected!"
            echo "Main has changes that conflict with remote-main"
            echo "This requires manual resolution"
            
            # Abort the merge
            git merge --abort
            
            # Show what files conflict
            echo ""
            echo "Files that would conflict:"
            git diff --name-only main origin/remote-main
            
            exit 1
          fi
